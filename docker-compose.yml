services:
  api:
    image: node:22-alpine
    working_dir: /app
    command: sh -c "npm install -g json-server && json-server --watch db.json --port 3001 --host 0.0.0.0"
    ports:
      - "${BAKCEND_PORT}:3001"
    volumes:
      - .:/app
    env_file:
      - .env

  frontend:
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "${FRONT_PORT}:80"
    depends_on:
      - api
    env_file:
      - .env
