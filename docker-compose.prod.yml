services:
  api:
    build: 
      context: .
      dockerfile: Dockerfile.api
    ports:
      - "${BAKCEND_PORT}:3001"
    env_file:
      - .env
    networks:
      - dokploy-network

  frontend:
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "${FRONT_PORT}:80"
    depends_on:
      - api
    env_file:
      - .env
    networks:
      - dokploy-network

networks:
  dokploy-network:
    external: true
